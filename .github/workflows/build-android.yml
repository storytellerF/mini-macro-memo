name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: npx expo prebuild && cd android && ./gradlew assembleRelease
        env:
          com.storyteller_f.sign_path: ${{ secrets.COM_STORYTELLER_F_SIGN_PATH }}
          com.storyteller_f.sign_key: ${{ secrets.COM_STORYTELLER_F_SIGN_KEY }}
          com.storyteller_f.sign_alias: ${{ secrets.COM_STORYTELLER_F_SIGN_ALIAS }}
          com.storyteller_f.sign_store_password: ${{ secrets.COM_STORYTELLER_F_SIGN_STORE_PASSWORD }}
          com.storyteller_f.sign_key_password: ${{ secrets.COM_STORYTELLER_F_SIGN_KEY_PASSWORD }}
          # GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
